<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 马卡龙海滩壁纸 🌸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:'Segoe UI','Microsoft YaHei',sans-serif;cursor:default;user-select:none;}
canvas{display:block;position:fixed;top:0;left:0;z-index:0;}
.dialog-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.cute-dialog{background:linear-gradient(145deg,#FFF5F8,#F5F0FF,#F0FFF5);border-radius:28px;padding:44px 54px;text-align:center;box-shadow:0 16px 50px rgba(255,181,194,0.45),0 0 0 3px #FFB5C2,0 0 60px rgba(199,206,234,0.2);position:relative;min-width:400px;animation:dialogPop 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);overflow:hidden;}
.cute-dialog::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,181,194,0.1) 0%,transparent 60%);animation:shimmer 3s ease-in-out infinite;}
@keyframes shimmer{0%,100%{transform:rotate(0deg);}50%{transform:rotate(180deg);}}
@keyframes dialogPop{0%{transform:scale(0.2) rotate(-5deg);opacity:0;}60%{transform:scale(1.05) rotate(1deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.dialog-title{font-size:24px;color:#E75480;margin-bottom:30px;font-weight:bold;line-height:1.6;position:relative;z-index:1;text-shadow:0 1px 2px rgba(255,181,194,0.3);}
.dialog-title::before{content:'🌸 ';}
.dialog-title::after{content:' 🌸';}
.cute-btn{background:linear-gradient(135deg,#FFB5C2,#FFC1CC);border:none;border-radius:50px;padding:13px 34px;font-size:16px;color:#fff;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px rgba(255,181,194,0.4);margin:0 8px;font-family:inherit;position:relative;z-index:1;}
.cute-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(255,181,194,0.6);}
.cute-btn:active{transform:translateY(0);}
.cute-btn.super-btn{background:linear-gradient(135deg,#FF69B4,#FF1493);box-shadow:0 4px 15px rgba(255,105,180,0.4);}
.cute-btn.super-btn:hover{box-shadow:0 8px 25px rgba(255,105,180,0.6);transform:translateY(-3px) scale(1.05);}
.runaway-btn{position:relative;transition:none !important;}
.city-input{width:80%;padding:15px 22px;border:2.5px solid #FFB5C2;border-radius:50px;font-size:17px;outline:none;text-align:center;font-family:inherit;background:#FFF5F7;color:#E75480;margin-bottom:22px;position:relative;z-index:1;}
.city-input::placeholder{color:#FFC1CC;}
.city-input:focus{border-color:#FF69B4;box-shadow:0 0 20px rgba(255,105,180,0.25);}
.context-menu{position:fixed;background:linear-gradient(135deg,#FFF5F7,#F0F0FF);border-radius:18px;box-shadow:0 10px 35px rgba(0,0,0,0.18),0 0 0 2px #FFB5C2;z-index:2000;overflow:hidden;min-width:210px;animation:menuPop 0.2s ease;}
@keyframes menuPop{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
.menu-item{padding:15px 26px;cursor:pointer;transition:all 0.2s;font-size:15px;color:#E75480;border-bottom:1px solid #FFE4E9;}
.menu-item:last-child{border-bottom:none;}
.menu-item:hover{background:linear-gradient(135deg,#FFE4F0,#F0F0FF);padding-left:32px;}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FFB5C2,#C7CEEA);color:#fff;padding:15px 30px;border-radius:50px;font-size:15px;z-index:3000;box-shadow:0 6px 25px rgba(255,181,194,0.5);animation:toastIn 0.4s ease,toastOut 0.4s ease 2.6s forwards;white-space:nowrap;}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-20px);}100%{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes toastOut{0%{opacity:1;transform:translateX(-50%) translateY(0);}100%{opacity:0;transform:translateX(-50%) translateY(-20px);}}
.weather-badge,.time-badge,.state-badge{position:fixed;background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);border-radius:22px;padding:10px 20px;z-index:100;font-size:14px;color:#E75480;box-shadow:0 4px 18px rgba(255,181,194,0.3);border:2px solid rgba(255,181,194,0.5);transition:all 0.3s;}
.weather-badge{top:16px;right:16px;}
.time-badge{top:16px;left:16px;}
.state-badge{bottom:16px;left:50%;transform:translateX(-50%);}
@media(max-width:600px){
.cute-dialog{min-width:auto;width:90vw;padding:30px 24px;border-radius:22px;}
.dialog-title{font-size:18px;margin-bottom:20px;}
.cute-btn{padding:10px 22px;font-size:14px;margin:0 4px;}
.city-input{font-size:15px;padding:12px 18px;}
.weather-badge,.time-badge,.state-badge{font-size:12px;padding:7px 14px;border-radius:16px;}
.weather-badge{top:10px;right:10px;}
.time-badge{top:10px;left:10px;}
.state-badge{bottom:10px;}
.context-menu{min-width:170px;}
.menu-item{padding:12px 20px;font-size:14px;}
.toast{font-size:13px;padding:12px 22px;}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div id="princessDialog" class="dialog-overlay">
<div class="cute-dialog" id="princessDialogBox">
<div class="dialog-title">你是可爱小公主吗？</div>
<div id="btnContainer" style="display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;min-height:60px;">
<button id="yesBtn" class="cute-btn runaway-btn">是的</button>
<button id="superCuteBtn" class="cute-btn super-btn">超级无敌可爱</button>
</div>
</div>
</div>

<div id="cityDialog" class="dialog-overlay" style="display:none;">
<div class="cute-dialog">
<div class="dialog-title">宝贝现在在哪个城市</div>
<input type="text" id="cityInput" class="city-input" placeholder="输入城市名称..."/>
<br/>
<button id="citySubmitBtn" class="cute-btn super-btn">确认 💕</button>
</div>
</div>

<div id="contextMenu" class="context-menu" style="display:none;">
<div class="menu-item" id="downloadImage">📷 下载当前画面</div>
<div class="menu-item" id="downloadHTML">💾 下载动态壁纸(HTML)</div>
</div>

<div id="weatherBadge" class="weather-badge" style="display:none;"></div>
<div id="timeBadge" class="time-badge" style="display:none;"></div>
<div id="stateBadge" class="state-badge" style="display:none;"></div>

<script>
var canvas = document.getElementById('bgCanvas');
var ctx = canvas.getContext('2d');
var W, H;

var MACARON = {
    pink:'#FFB5C2',mint:'#B5EAD7',lavender:'#C7CEEA',peach:'#FFDAC1',
    blue:'#B5D8EB',lemon:'#FFEAA7',lilac:'#E2B6CF',rose:'#FF69B4',
    hotPink:'#FF1493',skin:'#FFDAB9',skinShadow:'#F5C6A0',
    boyHair:'#4A3728',girlHair:'#2C1810',boyCloth:'#B5D8EB',
    boyClothNight:'#3A5A7A',girlCloth:'#FFB5C2',girlClothNight:'#6B3A5A',
    boyPants:'#C7CEEA',boyPantsNight:'#2A3A5A',
    blush:'rgba(255,130,140,0.4)',blushDeep:'rgba(255,100,120,0.55)'
};

var state = {
    isNight:false,timeProgress:0,weather:'clear',weatherDesc:'晴朗',
    city:'',temperature:'',coupleState:'sitting',stateTimer:0,
    stateDuration:12000,coupleX:0,coupleY:0,runOffset:0,walkOffset:0,
    animationTime:0,fireworks:[],fireworkTimer:0,hearts:[],
    breezeParticles:[],rainDrops:[],snowFlakes:[],seagulls:[],
    stars:[],clouds:[],dialogComplete:false,waveOffset:0,shells:[],
    zzzParticles:[],sparkles:[],transitionProgress:1,
    hairWindPhase:0,eyeBlinkTimer:0,eyeBlinkState:false
};

var dayStates = ['sitting','hugging','kissing','holding_hands','running','walking','drinking'];
var nightStates = ['watching_fireworks','watching_fireworks','watching_fireworks','sleeping'];
var nightSequence = ['watching_fireworks','sleeping'];
var nightSequenceIndex = 0;
var stateLabels = {
    sitting:'并肩而坐',hugging:'甜蜜拥抱',kissing:'浪漫亲吻',holding_hands:'牵手漫步',
    running:'海滩奔跑',walking:'海边散步',drinking:'对饮时光',
    watching_fireworks:'看烟花',sleeping:'相拥而眠'
};

function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    state.coupleX = W * 0.5;
    state.coupleY = H * 0.73;
    if(state.stars.length === 0) initStars();
    if(state.clouds.length === 0) initClouds();
    if(state.shells.length === 0) initShells();
    if(state.seagulls.length === 0) initSeagulls();
}

function initStars(){
    state.stars = [];
    for(var i=0;i<180;i++){
        state.stars.push({x:Math.random()*W,y:Math.random()*H*0.42,size:Math.random()*2.2+0.4,twinkle:Math.random()*Math.PI*2,speed:Math.random()*2.5+0.8});
    }
}

function initClouds(){
    state.clouds = [];
    for(var i=0;i<7;i++){
        state.clouds.push({x:Math.random()*W*1.5-W*0.25,y:H*0.04+Math.random()*H*0.22,w:90+Math.random()*140,speed:0.15+Math.random()*0.45,opacity:0.55+Math.random()*0.4});
    }
}

function initShells(){
    state.shells = [];
    for(var i=0;i<15;i++){
        state.shells.push({x:Math.random()*W,y:H*0.72+Math.random()*H*0.22,size:2+Math.random()*4,color:[MACARON.pink,MACARON.lavender,MACARON.mint,MACARON.peach][Math.floor(Math.random()*4)],rotation:Math.random()*Math.PI*2});
    }
}

function initSeagulls(){
    state.seagulls = [];
    for(var i=0;i<5;i++){
        state.seagulls.push({x:Math.random()*W,y:H*0.08+Math.random()*H*0.18,speed:0.4+Math.random()*0.8,wingPhase:Math.random()*Math.PI*2,size:7+Math.random()*7});
    }
}

function updateTime(){
    var now = new Date();
    var hours = now.getHours();
    var minutes = now.getMinutes();
    state.timeProgress = (hours*60+minutes)/1440;
    state.isNight = hours >= 19 || hours < 6;
    var tb = document.getElementById('timeBadge');
    if(tb && tb.style.display !== 'none'){
        tb.textContent = (state.isNight?'🌙 ':'☀️ ')+hours.toString().padStart(2,'0')+':'+minutes.toString().padStart(2,'0');
    }
}

function getSkyColors(){
    var hours = new Date().getHours()+new Date().getMinutes()/60;
    if(hours>=5.5&&hours<7){var t=(hours-5.5)/1.5;return{top:lerpColor('#1A1040','#87CEEB',t),bottom:lerpColor('#FF8A80','#FFEAA7',t)};}
    if(hours>=7&&hours<17){return{top:'#87CEEB',bottom:'#E8F4FD'};}
    if(hours>=17&&hours<18.5){var t2=(hours-17)/1.5;return{top:lerpColor('#87CEEB','#2D1B69',t2),bottom:lerpColor('#E8F4FD','#FF6B6B',t2)};}
    if(hours>=18.5&&hours<20){var t3=(hours-18.5)/1.5;return{top:lerpColor('#2D1B69','#0F0C29',t3),bottom:lerpColor('#FF6B6B','#302B63',t3)};}
    return{top:'#0F0C29',bottom:'#1A1545'};
}

function lerpColor(a,b,t){
    t=Math.max(0,Math.min(1,t));
    var ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
    var br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
    var rr=Math.round(ar+(br-ar)*t),rg=Math.round(ag+(bg-ag)*t),rb=Math.round(ab+(bb-ab)*t);
    return '#'+((1<<24)+(rr<<16)+(rg<<8)+rb).toString(16).slice(1);
}

function drawSky(){
    var colors = getSkyColors();
    var grad = ctx.createLinearGradient(0,0,0,H*0.5);
    grad.addColorStop(0,colors.top);
    grad.addColorStop(1,colors.bottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H*0.5);
}

function drawSun(){
    if(state.isNight) return;
    var hours = new Date().getHours()+new Date().getMinutes()/60;
    if(hours<5.5||hours>19.5) return;
    var t = (hours-5.5)/14;
    var sx = W*0.08+t*W*0.84;
    var sy = H*0.38-Math.sin(t*Math.PI)*H*0.32;
    var outerGlow = ctx.createRadialGradient(sx,sy,0,sx,sy,80);
    outerGlow.addColorStop(0,'rgba(255,249,196,0.5)');
    outerGlow.addColorStop(0.4,'rgba(255,224,130,0.2)');
    outerGlow.addColorStop(1,'rgba(255,224,130,0)');
    ctx.fillStyle = outerGlow;
    ctx.beginPath();ctx.arc(sx,sy,80,0,Math.PI*2);ctx.fill();
    var innerGlow = ctx.createRadialGradient(sx,sy,0,sx,sy,35);
    innerGlow.addColorStop(0,'#FFFDE7');
    innerGlow.addColorStop(0.6,'#FFE082');
    innerGlow.addColorStop(1,'#FFD54F');
    ctx.fillStyle = innerGlow;
    ctx.beginPath();ctx.arc(sx,sy,28,0,Math.PI*2);ctx.fill();
    for(var i=0;i<8;i++){
        var angle = (i/8)*Math.PI*2+state.animationTime*0.3;
        var rayLen = 45+Math.sin(state.animationTime*2+i)*8;
        ctx.strokeStyle = 'rgba(255,236,179,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx+Math.cos(angle)*32,sy+Math.sin(angle)*32);
        ctx.lineTo(sx+Math.cos(angle)*rayLen,sy+Math.sin(angle)*rayLen);
        ctx.stroke();
    }
}

function drawMoon(){
    if(!state.isNight) return;
    var hours = new Date().getHours();
    if(hours>=19) hours-=24;
    var t = (hours-6+new Date().getMinutes()/60)/12;
    var mx = W*0.1+Math.abs(t)*W*0.8;
    var my = H*0.14-Math.sin(Math.abs(t)*Math.PI)*H*0.08;
    var moonGlow = ctx.createRadialGradient(mx,my,15,mx,my,100);
    moonGlow.addColorStop(0,'rgba(255,248,231,0.15)');
    moonGlow.addColorStop(1,'rgba(255,248,231,0)');
    ctx.fillStyle = moonGlow;
    ctx.beginPath();ctx.arc(mx,my,100,0,Math.PI*2);ctx.fill();
    ctx.fillStyle = '#FFF8E7';
    ctx.beginPath();ctx.arc(mx,my,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle = getSkyColors().top;
    ctx.beginPath();ctx.arc(mx-9,my-4,23,0,Math.PI*2);ctx.fill();
    ctx.fillStyle = 'rgba(200,195,180,0.15)';
    ctx.beginPath();ctx.arc(mx+5,my+6,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(mx-2,my+10,3,0,Math.PI*2);ctx.fill();
}

function drawStars(){
    if(!state.isNight) return;
    for(var i=0;i<state.stars.length;i++){
        var s = state.stars[i];
        s.twinkle += s.speed*0.02;
        var alpha = 0.25+Math.sin(s.twinkle)*0.45;
        ctx.fillStyle = 'rgba(255,255,255,'+alpha+')';
        ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill();
    }
}

function drawClouds(){
    var count = (state.weather==='cloudy'||state.weather==='rain'||state.weather==='snow')?state.clouds.length:Math.min(3,state.clouds.length);
    for(var i=0;i<count;i++){
        var c = state.clouds[i];
        c.x += c.speed;
        if(c.x>W+250) c.x = -250;
        var alpha = state.isNight?c.opacity*0.25:c.opacity;
        ctx.fillStyle = state.isNight?'rgba(50,50,70,'+alpha+')':'rgba(255,255,255,'+alpha+')';
        drawCloudShape(c.x,c.y,c.w);
    }
}

function drawCloudShape(x,y,w){
    var h = w*0.38;
    ctx.beginPath();
    ctx.arc(x,y,h*0.45,0,Math.PI*2);
    ctx.arc(x+w*0.22,y-h*0.25,h*0.55,0,Math.PI*2);
    ctx.arc(x+w*0.5,y-h*0.15,h*0.5,0,Math.PI*2);
    ctx.arc(x+w*0.72,y+h*0.02,h*0.42,0,Math.PI*2);
    ctx.fill();
}

function drawDistantIslands(){
    var nightMul = state.isNight?0.3:1;
    ctx.fillStyle = state.isNight?'#151535':MACARON.mint;
    ctx.beginPath();
    ctx.moveTo(W*0.58,H*0.43);
    ctx.quadraticCurveTo(W*0.64,H*0.31,W*0.72,H*0.37);
    ctx.quadraticCurveTo(W*0.78,H*0.28,W*0.86,H*0.35);
    ctx.quadraticCurveTo(W*0.92,H*0.32,W*0.97,H*0.41);
    ctx.lineTo(W*0.97,H*0.46);ctx.lineTo(W*0.58,H*0.46);ctx.fill();
    ctx.fillStyle = state.isNight?'#121230':'#A8E6CF';
    ctx.beginPath();
    ctx.moveTo(W*0.03,H*0.44);
    ctx.quadraticCurveTo(W*0.09,H*0.35,W*0.17,H*0.39);
    ctx.quadraticCurveTo(W*0.23,H*0.34,W*0.3,H*0.42);
    ctx.lineTo(W*0.3,H*0.46);ctx.lineTo(W*0.03,H*0.46);ctx.fill();
}

function drawLighthouse(){
    var lx = W*0.89, ly = H*0.39;
    ctx.fillStyle = state.isNight?'#252550':MACARON.peach;
    ctx.beginPath();
    ctx.moveTo(lx-5,ly);ctx.lineTo(lx-3,ly-32);ctx.lineTo(lx+3,ly-32);ctx.lineTo(lx+5,ly);ctx.fill();
    ctx.fillStyle = state.isNight?'#FF6B6B':MACARON.pink;
    ctx.beginPath();ctx.moveTo(lx-7,ly-32);ctx.lineTo(lx+7,ly-32);ctx.lineTo(lx,ly-44);ctx.fill();
    if(state.isNight){
        var rot = state.animationTime*0.5;
        for(var r=0;r<2;r++){
            var a = rot+r*Math.PI;
            ctx.save();ctx.translate(lx,ly-38);ctx.rotate(a);
            var beam = ctx.createLinearGradient(0,0,120,0);
            beam.addColorStop(0,'rgba(255,220,120,0.5)');
            beam.addColorStop(1,'rgba(255,220,120,0)');
            ctx.fillStyle = beam;
            ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(120,-8);ctx.lineTo(120,8);ctx.lineTo(0,3);ctx.fill();
            ctx.restore();
        }
        var glow = ctx.createRadialGradient(lx,ly-38,2,lx,ly-38,35);
        glow.addColorStop(0,'rgba(255,220,120,0.7)');
        glow.addColorStop(1,'rgba(255,220,120,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();ctx.arc(lx,ly-38,35,0,Math.PI*2);ctx.fill();
    }
}

function drawSea(){
    var seaTop = H*0.44, seaBottom = H*0.66;
    var seaGrad = ctx.createLinearGradient(0,seaTop,0,seaBottom);
    if(state.isNight){
        seaGrad.addColorStop(0,'#152238');seaGrad.addColorStop(0.5,'#1A3050');seaGrad.addColorStop(1,'#223A58');
    } else {
        seaGrad.addColorStop(0,'#7EC8E3');seaGrad.addColorStop(0.5,'#6BB5D8');seaGrad.addColorStop(1,'#A8E6CF');
    }
    ctx.fillStyle = seaGrad;
    ctx.fillRect(0,seaTop,W,seaBottom-seaTop);

    for(var layer=0;layer<5;layer++){
        var waveY = seaTop+(seaBottom-seaTop)*(0.2+layer*0.17);
        var amp = 2.5+layer*1.8;
        var freq = 0.007-layer*0.0008;
        var speed = 0.4+layer*0.25;
        ctx.beginPath();ctx.moveTo(0,waveY);
        for(var x=0;x<=W;x+=3){
            var y = waveY+Math.sin(x*freq+state.waveOffset*speed+layer*1.8)*amp+Math.sin(x*freq*2.5+state.waveOffset*speed*1.3)*amp*0.4;
            ctx.lineTo(x,y);
        }
        ctx.lineTo(W,seaBottom);ctx.lineTo(0,seaBottom);ctx.closePath();
        var alpha = 0.1+layer*0.06;
        ctx.fillStyle = state.isNight?'rgba(25,50,85,'+alpha+')':'rgba(255,255,255,'+alpha+')';
        ctx.fill();
    }

    if(!state.isNight){
        for(var sp=0;sp<6;sp++){
            var spx = (state.waveOffset*20+sp*W/5)%W;
            var spy = seaTop+10+sp*8+Math.sin(state.waveOffset+sp)*5;
            ctx.fillStyle = 'rgba(255,255,255,'+(0.3+Math.sin(state.animationTime*3+sp)*0.15)+')';
            ctx.beginPath();ctx.arc(spx,spy,1.5,0,Math.PI*2);ctx.fill();
        }
    }

    var foamY = seaBottom-4;
    ctx.beginPath();ctx.moveTo(0,foamY);
    for(var x=0;x<=W;x+=2){
        var y = foamY+Math.sin(x*0.014+state.waveOffset*0.7)*4+Math.sin(x*0.028+state.waveOffset*1.1)*2;
        ctx.lineTo(x,y);
    }
    ctx.lineTo(W,seaBottom+8);ctx.lineTo(0,seaBottom+8);ctx.closePath();
    ctx.fillStyle = state.isNight?'rgba(180,200,220,0.25)':'rgba(255,255,255,0.65)';
    ctx.fill();
}

function drawBeach(){
    var beachTop = H*0.64;
    var beachGrad = ctx.createLinearGradient(0,beachTop,0,H);
    if(state.isNight){
        beachGrad.addColorStop(0,'#3A3025');beachGrad.addColorStop(0.3,'#453830');beachGrad.addColorStop(1,'#2A2218');
    } else {

    }

    }
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();

    var tassels = [MACARON.pink,MACARON.lavender,MACARON.mint,MACARON.peach,MACARON.blue];

function drawPerson(x,y,gender,pose,faceDir,scale){
    ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
    var skinColor = MACARON.skin;
    var skinShadow = MACARON.skinShadow;

    var pantsColor = gender==='male'?(state.isNight?MACARON.boyPantsNight:MACARON.boyPants):clothColor;
    var headY = -52, bodyY = -30;
    var isLookingUp = (pose === 'watching_fireworks');
    var wind = Math.sin(state.hairWindPhase)*3;

    state.eyeBlinkTimer += 0.016;
    if(state.eyeBlinkTimer > 3+Math.random()*2){
        state.eyeBlinkState = true;
        if(state.eyeBlinkTimer > 3.15+Math.random()*0.1){

    ctx.fillStyle = clothColor;

        var runSpeed = pose==='running'?8:4;
        roundRect(-9,bodyY,18,20,3);
        ctx.fillStyle = pantsColor;
        var legPhase = Math.sin(state.animationTime*runSpeed);

            roundRect(-9,bodyY+20,8,12+legPhase*2,2);

        } else {
            roundRect(-9,bodyY+20,7,14+legPhase*3,2);

            ctx.beginPath();

        } else {

    ctx.fillStyle = skinColor;

    ctx.fillStyle = skinShadow;
    ctx.beginPath();ctx.arc(0,headY+5,15,0.1*Math.PI,0.9*Math.PI);ctx.fill();
    ctx.fillStyle = skinColor;
    ctx.beginPath();ctx.arc(0,headY+3,14,0.15*Math.PI,0.85*Math.PI);ctx.fill();

    if(gender==='male'){
        ctx.beginPath();

        ctx.beginPath();

        ctx.quadraticCurveTo(-17+wind*0.3,headY-2,-15,headY+4);
        ctx.lineTo(-13,headY-3);ctx.fill();
        ctx.beginPath();
        ctx.moveTo(16,headY-7);
        ctx.quadraticCurveTo(17+wind*0.3,headY-2,15,headY+4);
        ctx.lineTo(13,headY-3);ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-8,headY-16);
        ctx.quadraticCurveTo(-3+wind*0.2,headY-22,2,headY-17);
        ctx.quadraticCurveTo(5+wind*0.2,headY-20,8,headY-16);
        ctx.lineTo(6,headY-13);ctx.lineTo(-6,headY-13);ctx.fill();
    } else {
        ctx.beginPath();
        ctx.arc(0,headY-4,16,Math.PI*0.85,Math.PI*0.15);ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-16,headY-6);
        ctx.quadraticCurveTo(-19+wind*0.5,headY+8,-17+wind,headY+22);
        ctx.quadraticCurveTo(-15+wind*1.2,headY+32,-13+wind*1.5,headY+42);

        ctx.quadraticCurveTo(-11,headY+10,-13,headY-2);ctx.fill();

        ctx.quadraticCurveTo(11,headY+10,13,headY-2);ctx.fill();
        var bangs = [[-10,-4],[-5,-7],[0,-8],[5,-7],[10,-4]];

    var glassY = headY+(isLookingUp?-3:0);

    if(gender==='male'){

    } else {
        ctx.beginPath();ctx.moveTo(-12,glassY);ctx.lineTo(-15,headY-3);ctx.stroke();

    ctx.fillStyle = 'rgba(200,220,255,0.12)';
    ctx.beginPath();ctx.arc(-6,glassY,5.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6,glassY,5.5,0,Math.PI*2);ctx.fill();

    if(!state.eyeBlinkState){

        ctx.beginPath();ctx.arc(7,headY+eyeOffY-1,1,0,Math.PI*2);ctx.fill();

        ctx.beginPath();
        var kx = faceDir*2, ky = headY+8;
        ctx.moveTo(kx,ky);ctx.bezierCurveTo(kx-3,ky-2,kx-3,ky+3,kx,ky+2);ctx.bezierCurveTo(kx+3,ky+3,kx+3,ky-2,kx,ky);
        ctx.fill();
    } else if(pose==='drinking'||pose==='smiling'){
        ctx.strokeStyle = '#E75480';ctx.lineWidth = 1.5;

        ctx.beginPath();ctx.arc(0,headY+6,3.5,0.1*Math.PI,0.9*Math.PI);ctx.fill();
    } else if(pose==='running'){

        ctx.beginPath();ctx.arc(0,headY+7,3,0,Math.PI);ctx.fill();
    } else if(pose==='watching_fireworks'){

        ctx.beginPath();ctx.ellipse(0,headY+7,3.5,2.5,0,0,Math.PI);ctx.fill();

    ctx.fillStyle = skinColor;
    if(pose==='hugging'){

        ctx.save();ctx.translate(faceDir===1?8:-8,bodyY+5);
        ctx.rotate(faceDir*0.3);
        roundRect(faceDir===1?-5:0,0,5,14,2);ctx.restore();
    } else if(pose==='kissing'){
        ctx.save();ctx.translate(faceDir===1?-10:10,bodyY+8);
        ctx.rotate(faceDir*0.25);
        roundRect(0,0,5,14,2);ctx.restore();
        ctx.save();ctx.translate(faceDir===1?6:-6,bodyY+8);
        ctx.rotate(faceDir*0.2);
        roundRect(faceDir===1?-5:0,0,5,12,2);ctx.restore();
    } else if(pose==='holding_hands'){
        ctx.save();ctx.translate(faceDir===1?-14:14,bodyY+18);
        roundRect(0,0,5,10,2);ctx.restore();
    } else if(pose==='drinking'){
        ctx.save();ctx.translate(-13,bodyY+4);ctx.rotate(-0.3);roundRect(0,0,5,14,2);ctx.restore();
        ctx.save();ctx.translate(13,bodyY+4);ctx.rotate(0.3);roundRect(-5,0,5,14,2);ctx.restore();
        ctx.fillStyle = state.isNight?'#4A3A5A':MACARON.lavender;
        roundRect(-15,bodyY-1,5,8,2);
        roundRect(11,bodyY-1,5,8,2);
    } else if(pose==='running'||pose==='walking'){
        var runSpeed2 = pose==='running'?8:4;
        var armSwing = Math.sin(state.animationTime*runSpeed2)*(pose==='running'?25:12);
        ctx.save();ctx.translate(-11,bodyY+6);ctx.rotate((-20+armSwing)*Math.PI/180);roundRect(0,0,4.5,14,2);ctx.restore();

            roundRect(1,bodyY+36,8,4,1);

function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();
}

    if(Math.random()<0.025){
        state.zzzParticles.push({x:cx+35*scale,y:cy-25*scale,size:10+Math.random()*8,vy:-0.3-Math.random()*0.3,life:1,phase:Math.random()*Math.PI*2,rot:Math.random()*0.3-0.15});

function drawZzz(){
    for(var i=state.zzzParticles.length-1;i>=0;i--){
        var z = state.zzzParticles[i];
        z.y += z.vy;z.x += Math.sin(z.phase+state.animationTime*2)*0.4;z.life -= 0.005;z.rot += 0.005;
        if(z.life<=0){state.zzzParticles.splice(i,1);continue;}
        ctx.save();ctx.translate(z.x,z.y);ctx.rotate(z.rot||0);
        ctx.globalAlpha = z.life*0.8;
        ctx.fillStyle = state.isNight?'#C7CEEA':MACARON.lavender;
        ctx.font = 'bold '+z.size+'px sans-serif';
        ctx.fillText('z',0,0);
        ctx.strokeStyle = state.isNight?'rgba(199,206,234,0.3)':'rgba(199,206,234,0.4)';
        ctx.lineWidth = 0.5;ctx.strokeText('z',0,0);
        ctx.globalAlpha = 1;ctx.restore();
    }
}

function drawCouple(){
    var cx = state.coupleX, cy = state.coupleY;
    var pose = state.coupleState;
    var s = Math.min(W,H)/750;

    if(pose==='running'){cx += Math.sin(state.runOffset)*W*0.15;cy = H*0.68;}
    else if(pose==='walking'){cx += Math.sin(state.walkOffset)*W*0.1;cy = H*0.68;}

    if(pose==='sleeping'){
        drawSleepingCouple(cx,cy,s);
        drawZzz();
        return;
    }

    if(pose!=='running'&&pose!=='walking'&&pose!=='watching_fireworks'){
        drawBlanket(cx,cy+18*s);
    }

    var spacing = 38*s;
    if(pose==='hugging') spacing = 8*s;
    if(pose==='kissing') spacing = 4*s;
    if(pose==='holding_hands') spacing = 30*s;
    if(pose==='watching_fireworks') spacing = 28*s;

    var boyX = cx-spacing/2, girlX = cx+spacing/2;
    var boyFaceDir = 1, girlFaceDir = -1;
    if(pose==='running'||pose==='walking'){boyFaceDir=1;girlFaceDir=1;}
    if(pose==='watching_fireworks'){boyFaceDir=1;girlFaceDir=-1;}

    if(pose==='kissing'||pose==='hugging'){
        var leanAngle = pose==='kissing' ? 0.12 : 0.08;
        var breathe = Math.sin(state.animationTime*1.5)*1.5;
        ctx.save();
        ctx.translate(boyX,cy);ctx.rotate(leanAngle);
        drawPerson(0,0,'male',pose,1,s);
        ctx.restore();
        ctx.save();
        ctx.translate(girlX,cy);ctx.rotate(-leanAngle);
        drawPerson(0,0,'female',pose,-1,s);
        ctx.restore();
    } else {
        drawPerson(boyX,cy,'male',pose,boyFaceDir,s);
        drawPerson(girlX,cy,'female',pose,girlFaceDir,s);
    }

    if(pose==='kissing'||pose==='hugging'){
        if(Math.random()<0.06){
            state.hearts.push({x:cx+(Math.random()-0.5)*60,y:cy-70*s,size:5+Math.random()*10,vy:-0.4-Math.random()*0.5,life:1,color:[MACARON.pink,MACARON.rose,MACARON.hotPink][Math.floor(Math.random()*3)],rot:Math.random()*0.4-0.2});
        }
    }
    if(pose==='watching_fireworks'&&Math.random()<0.03){
        state.sparkles.push({x:cx+(Math.random()-0.5)*40,y:cy-55*s,size:2+Math.random()*4,life:1,color:[MACARON.lemon,MACARON.mint,MACARON.pink][Math.floor(Math.random()*3)]});
    }
    if(pose==='holding_hands'&&Math.random()<0.02){
        state.hearts.push({x:cx,y:cy-10*s,size:4+Math.random()*5,vy:-0.3,life:0.8,color:MACARON.pink,rot:0});
    }
}

function drawHearts(){
    for(var i=state.hearts.length-1;i>=0;i--){
        var h = state.hearts[i];
        h.y += h.vy;h.life -= 0.006;h.rot = (h.rot||0)+0.01;
        if(h.life<=0){state.hearts.splice(i,1);continue;}
        ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.rot||0);ctx.scale(h.size/10,h.size/10);
        ctx.globalAlpha = h.life;ctx.fillStyle = h.color;
        ctx.beginPath();ctx.moveTo(0,-3);
        ctx.bezierCurveTo(-5,-10,-10,-3,0,5);ctx.moveTo(0,-3);
        ctx.bezierCurveTo(5,-10,10,-3,0,5);ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();ctx.arc(-3,-5,2,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha = 1;ctx.restore();
    }
}

function drawSparkles(){
    for(var i=state.sparkles.length-1;i>=0;i--){
        var sp = state.sparkles[i];
        sp.life -= 0.015;sp.y -= 0.3;
        if(sp.life<=0){state.sparkles.splice(i,1);continue;}
        ctx.save();ctx.translate(sp.x,sp.y);ctx.globalAlpha = sp.life;
        ctx.fillStyle = sp.color;
        var sz = sp.size*sp.life;
        ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*0.3,0);ctx.lineTo(0,sz);ctx.lineTo(-sz*0.3,0);ctx.fill();
        ctx.beginPath();ctx.moveTo(-sz,0);ctx.lineTo(0,sz*0.3);ctx.lineTo(sz,0);ctx.lineTo(0,-sz*0.3);ctx.fill();
        ctx.globalAlpha = 1;ctx.restore();
    }
}

function drawBreeze(){
    if(state.breezeParticles.length<35&&Math.random()<0.12){
        state.breezeParticles.push({x:-10,y:H*0.25+Math.random()*H*0.55,size:1.5+Math.random()*3,speed:1+Math.random()*2.5,life:1,color:[MACARON.pink,MACARON.lavender,MACARON.mint,MACARON.peach,MACARON.blue][Math.floor(Math.random()*5)]});
    }
    for(var i=state.breezeParticles.length-1;i>=0;i--){
        var p = state.breezeParticles[i];
        p.x += p.speed*2.2;p.y += Math.sin(p.x*0.008+state.animationTime)*0.6;p.life -= 0.003;
        if(p.x>W+10||p.life<=0){state.breezeParticles.splice(i,1);continue;}
        ctx.fillStyle = p.color;ctx.globalAlpha = p.life*0.5;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function drawSeagulls(){
    if(state.isNight) return;
    for(var i=0;i<state.seagulls.length;i++){
        var sg = state.seagulls[i];
        sg.x += sg.speed;sg.wingPhase += 0.07;
        if(sg.x>W+60) sg.x = -60;
        var wingY = Math.sin(sg.wingPhase)*sg.size*0.4;
        ctx.strokeStyle = '#777';ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(sg.x-sg.size,sg.y+wingY);
        ctx.quadraticCurveTo(sg.x-sg.size*0.3,sg.y-wingY*0.5,sg.x,sg.y);
        ctx.quadraticCurveTo(sg.x+sg.size*0.3,sg.y-wingY*0.5,sg.x+sg.size,sg.y+wingY);
        ctx.stroke();
    }
}

function drawWeatherEffects(){
    if(state.weather==='rain'){
        while(state.rainDrops.length<250){
            state.rainDrops.push({x:Math.random()*W,y:Math.random()*H,speed:7+Math.random()*7,length:8+Math.random()*18});
        }
        ctx.strokeStyle = 'rgba(174,194,224,0.35)';ctx.lineWidth = 1;
        for(var i=state.rainDrops.length-1;i>=0;i--){
            var d = state.rainDrops[i];
            d.y += d.speed;d.x += 2;
            if(d.y>H){d.y=-10;d.x=Math.random()*W;}
            ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+2,d.y+d.length);ctx.stroke();
        }
    } else { state.rainDrops = []; }

    if(state.weather==='snow'){
        while(state.snowFlakes.length<180){
            state.snowFlakes.push({x:Math.random()*W,y:Math.random()*H,size:1.5+Math.random()*4,speed:0.4+Math.random()*1.5,drift:Math.random()*2-1,phase:Math.random()*Math.PI*2});
        }
        for(var i=state.snowFlakes.length-1;i>=0;i--){
            var f = state.snowFlakes[i];
            f.y += f.speed;f.x += Math.sin(f.phase+state.animationTime)*f.drift*0.4;f.phase += 0.008;
            if(f.y>H){f.y=-5;f.x=Math.random()*W;}
            ctx.fillStyle = 'rgba(255,255,255,'+(0.5+f.size/8)+')';
            ctx.beginPath();ctx.arc(f.x,f.y,f.size,0,Math.PI*2);ctx.fill();
        }
    } else { state.snowFlakes = []; }

    if(state.weather==='cloudy'||state.weather==='rain'){
        ctx.fillStyle = state.isNight?'rgba(15,15,35,0.2)':'rgba(140,140,160,0.12)';
        ctx.fillRect(0,0,W,H);
    }
}

function drawFireworks(){
    if(!state.isNight) return;
    if(state.coupleState==='watching_fireworks'){
        state.fireworkTimer += 1;
        if(state.fireworkTimer>30+Math.random()*40){
            state.fireworkTimer = 0;launchFirework();
        }
    }
    for(var i=state.fireworks.length-1;i>=0;i--){
        var fw = state.fireworks[i];
        if(fw.phase==='launch'){
            fw.y -= fw.speed;fw.speed *= 0.985;
            ctx.fillStyle = '#FFF8E1';
            ctx.beginPath();ctx.arc(fw.x,fw.y,2.5,0,Math.PI*2);ctx.fill();
            for(var tr=0;tr<3;tr++){
                ctx.fillStyle = 'rgba(255,248,225,'+(0.3-tr*0.1)+')';
                ctx.beginPath();ctx.arc(fw.x+Math.random()*2-1,fw.y+4+tr*4,1.5-tr*0.3,0,Math.PI*2);ctx.fill();
            }
            if(fw.speed<1.8){
                fw.phase = 'explode';fw.particles = [];
                var colors = [MACARON.pink,MACARON.lavender,MACARON.mint,MACARON.peach,MACARON.blue,MACARON.lemon,MACARON.rose,MACARON.lilac,'#FFF8E1','#FFD700'];
                var c1 = colors[Math.floor(Math.random()*colors.length)];
                var c2 = colors[Math.floor(Math.random()*colors.length)];
                var c3 = colors[Math.floor(Math.random()*colors.length)];
                var pattern = Math.floor(Math.random()*4);
                var count = 90+Math.floor(Math.random()*50);
                for(var j=0;j<count;j++){
                    var angle = (j/count)*Math.PI*2;
                    var spd = 1+Math.random()*3.5;
                    if(pattern===1) spd *= 0.5+Math.random();
                    if(pattern===2){
                        var heartR = 3+Math.sin(angle*2)*1.5;
                        spd = heartR;
                    }
                    if(pattern===3) spd = 2+Math.random()*0.5;
                    var col = j%3===0?c1:j%3===1?c2:c3;
                    fw.particles.push({x:fw.x,y:fw.y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:1,color:col,size:1.5+Math.random()*2.5,trail:[],twinkle:Math.random()*Math.PI*2});
                }
                if(pattern===3){
                    for(var ring=0;ring<3;ring++){
                        var ringCount = 30+ring*10;
                        var ringR = 2+ring*1.5;
                        for(var j=0;j<ringCount;j++){
                            var angle = (j/ringCount)*Math.PI*2;
                            var col = ring===0?c1:ring===1?c2:c3;
                            fw.particles.push({x:fw.x,y:fw.y,vx:Math.cos(angle)*ringR,vy:Math.sin(angle)*ringR,life:1,color:col,size:1.5+Math.random()*1.5,trail:[],twinkle:Math.random()*Math.PI*2});
                        }
                    }
                }
            }
        } else if(fw.phase==='explode'){
            var allDead = true;
            for(var j=0;j<fw.particles.length;j++){
                var p = fw.particles[j];
                p.trail.push({x:p.x,y:p.y});
                if(p.trail.length>6) p.trail.shift();
                p.x += p.vx;p.y += p.vy;p.vy += 0.025;p.vx *= 0.99;p.life -= 0.008;
                p.twinkle += 0.15;
                if(p.life>0){
                    allDead = false;
                    for(var t=0;t<p.trail.length;t++){
                        var ta = (t/p.trail.length)*p.life*0.25;
                        ctx.fillStyle = p.color;ctx.globalAlpha = ta;
                        ctx.beginPath();ctx.arc(p.trail[t].x,p.trail[t].y,p.size*ta,0,Math.PI*2);ctx.fill();
                    }
                    var twinkleAlpha = 0.7+Math.sin(p.twinkle)*0.3;
                    ctx.fillStyle = p.color;ctx.globalAlpha = p.life*twinkleAlpha;
                    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
                    ctx.fillStyle = '#FFF';ctx.globalAlpha = p.life*0.4*twinkleAlpha;
                    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life*0.3,0,Math.PI*2);ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
            if(allDead) state.fireworks.splice(i,1);
        }
    }
}

function launchFirework(){
    state.fireworks.push({x:W*0.15+Math.random()*W*0.7,y:H*0.7,speed:3.5+Math.random()*3.5,phase:'launch',particles:[]});
}

function updateCoupleState(){
    state.stateTimer += 16;
    var wasNight = state.isNight;
    updateTime();
    if(wasNight !== state.isNight){
        nightSequenceIndex = 0;
        state.coupleState = state.isNight ? 'watching_fireworks' : 'sitting';
        state.stateTimer = 0;
        state.stateDuration = state.isNight ? 25000 : (8000+Math.random()*12000);
        updateStateBadge();
        return;
    }
    if(state.stateTimer>=state.stateDuration){
        state.stateTimer = 0;
        var newState;
        if(state.isNight){
            nightSequenceIndex++;
            if(nightSequenceIndex >= nightSequence.length) nightSequenceIndex = nightSequence.length - 1;
            newState = nightSequence[nightSequenceIndex];
            state.stateDuration = newState === 'watching_fireworks' ? 25000 : 99999999;
        } else {
            state.stateDuration = 8000+Math.random()*12000;
            var states = dayStates;
            newState = states[Math.floor(Math.random()*states.length)];
        }
        state.coupleState = newState;
        if(newState==='running') state.runOffset = 0;
        if(newState==='walking') state.walkOffset = 0;
        updateStateBadge();
    }
    if(state.coupleState==='running') state.runOffset += 0.015;
    if(state.coupleState==='walking') state.walkOffset += 0.008;
}

function updateStateBadge(){
    var badge = document.getElementById('stateBadge');
    if(badge) badge.textContent = '💕 '+(stateLabels[state.coupleState]||state.coupleState);
}

function showToast(msg){
    var existing = document.querySelector('.toast');
    if(existing) existing.remove();
    var t = document.createElement('div');t.className = 'toast';t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function(){if(t.parentNode)t.remove();},3000);
}

async function fetchWeather(city){
    try{
        var resp = await fetch('https://wttr.in/'+encodeURIComponent(city)+'?format=j1');
        var data = await resp.json();
        var current = data.current_condition[0];
        var code = parseInt(current.weatherCode);
        var temp = current.temp_C;
        var desc = current.lang_zh&&current.lang_zh[0]?current.lang_zh[0].value:current.weatherDesc[0].value;
        state.temperature = temp+'°C';state.weatherDesc = desc;
        if(code===113) state.weather='clear';
        else if(code===116) state.weather='cloudy';
        else if(code>=119&&code<=143) state.weather='cloudy';
        else if(code>=176&&code<=314) state.weather='rain';
        else if(code>=320&&code<=395) state.weather='snow';
        else state.weather='cloudy';
        var wb = document.getElementById('weatherBadge');
        var icon = state.weather==='clear'?'☀️':state.weather==='rain'?'🌧️':state.weather==='snow'?'❄️':'☁️';
        wb.textContent = icon+' '+city+' '+state.temperature+' '+state.weatherDesc;
        wb.style.display = 'block';
        showToast('已获取 '+city+' 天气：'+state.weatherDesc+' '+state.temperature);
    } catch(e){
        console.error('Weather fetch failed:',e);
        showToast('天气获取失败，使用默认天气');
        state.weather='clear';state.weatherDesc='晴朗';state.temperature='--';
        var wb2 = document.getElementById('weatherBadge');
        wb2.textContent = '☀️ '+city+' -- 晴朗';wb2.style.display = 'block';
    }
}

function render(){
    state.waveOffset += 0.02;
    state.animationTime += 0.016;
    state.hairWindPhase += 0.03;
    ctx.clearRect(0,0,W,H);
    drawSky();drawStars();drawSun();drawMoon();drawClouds();
    drawDistantIslands();drawLighthouse();drawSea();drawBeach();
    drawSeagulls();drawBreeze();
    if(state.dialogComplete){
        updateCoupleState();drawCouple();drawHearts();drawSparkles();drawFireworks();
    }
    drawWeatherEffects();
    requestAnimationFrame(render);
}

function initDialogs(){
    var princessDialog = document.getElementById('princessDialog');
    var cityDialog = document.getElementById('cityDialog');
    var yesBtn = document.getElementById('yesBtn');
    var superCuteBtn = document.getElementById('superCuteBtn');
    var cityInput = document.getElementById('cityInput');
    var citySubmitBtn = document.getElementById('citySubmitBtn');
    var dialogBox = document.getElementById('princessDialogBox');
    var btnContainer = document.getElementById('btnContainer');
    var escapeCount = 0;
    var cheekyMsgs = ['抓不到我~','嘿嘿~','再试试？','就不让你点~','你点不到我啦','略略略~','人家不想被选~','你确定吗？','想想再选哦~','那个按钮更可爱呢~'];
    var yesBtnTexts = ['是的','才不是','别点我','我跑了','追不到','哼哼'];

    yesBtn.addEventListener('mouseenter',function(){
        escapeCount++;
        var boxRect = dialogBox.getBoundingClientRect();
        var btnW = yesBtn.offsetWidth, btnH = yesBtn.offsetHeight;
        var padding = 20;
        var maxX = boxRect.width - btnW - padding;
        var maxY = boxRect.height - btnH - padding;
        var newX = padding + Math.random()*Math.max(0,maxX-padding);
        var newY = padding + Math.random()*Math.max(0,maxY-padding);
        yesBtn.style.position = 'absolute';
        yesBtn.style.left = newX+'px';
        yesBtn.style.top = newY+'px';
        yesBtn.style.transition = 'none';
        yesBtn.style.zIndex = '10';
        if(escapeCount<=yesBtnTexts.length){
            yesBtn.textContent = yesBtnTexts[escapeCount-1];
        }
        if(escapeCount%2===0){
            showToast(cheekyMsgs[Math.floor(Math.random()*cheekyMsgs.length)]);
        }
    });

    yesBtn.addEventListener('click',function(){
        var boxRect = dialogBox.getBoundingClientRect();
        var btnW = yesBtn.offsetWidth, btnH = yesBtn.offsetHeight;
        var padding = 20;
        var newX = padding+Math.random()*Math.max(0,boxRect.width-btnW-padding*2);
        var newY = padding+Math.random()*Math.max(0,boxRect.height-btnH-padding*2);
        yesBtn.style.position = 'absolute';
        yesBtn.style.left = newX+'px';yesBtn.style.top = newY+'px';
    });

    superCuteBtn.addEventListener('click',function(){
        princessDialog.style.display = 'none';
        cityDialog.style.display = 'flex';
        cityInput.focus();
    });

    citySubmitBtn.addEventListener('click',function(){
        var city = cityInput.value.trim();
        if(!city){showToast('请输入城市名称哦~');return;}
        state.city = city;
        cityDialog.style.display = 'none';
        state.dialogComplete = true;
        document.getElementById('timeBadge').style.display = 'block';
        document.getElementById('stateBadge').style.display = 'block';
        updateStateBadge();
        fetchWeather(city);
    });

    cityInput.addEventListener('keypress',function(e){
        if(e.key==='Enter') citySubmitBtn.click();
    });
}

function initContextMenu(){
    var menu = document.getElementById('contextMenu');
    document.addEventListener('contextmenu',function(e){
        e.preventDefault();
        menu.style.display = 'block';
        menu.style.left = Math.min(e.clientX,W-220)+'px';
        menu.style.top = Math.min(e.clientY,H-100)+'px';
    });
    document.addEventListener('click',function(){menu.style.display='none';});
    var longPressTimer = null;
    var longPressTarget = null;
    document.addEventListener('touchstart',function(e){
        longPressTarget = e.touches[0];
        longPressTimer = setTimeout(function(){
            menu.style.display = 'block';
            menu.style.left = Math.min(longPressTarget.clientX,W-220)+'px';
            menu.style.top = Math.min(longPressTarget.clientY,H-100)+'px';
        },600);
    },{passive:true});
    document.addEventListener('touchend',function(){clearTimeout(longPressTimer);},{passive:true});
    document.addEventListener('touchmove',function(){clearTimeout(longPressTimer);},{passive:true});
    document.getElementById('downloadImage').addEventListener('click',function(){
        var link = document.createElement('a');
        link.download = 'macaron-beach-'+Date.now()+'.png';
        link.href = canvas.toDataURL('image/png');link.click();
        showToast('画面已保存为PNG图片 💕');menu.style.display='none';
    });
    document.getElementById('downloadHTML').addEventListener('click',function(){
        var htmlContent = '<!DOCTYPE html>\n'+document.documentElement.outerHTML;
        var blob = new Blob([htmlContent],{type:'text/html;charset=utf-8'});
        var link = document.createElement('a');
        link.download = 'macaron-beach-wallpaper.html';
        link.href = URL.createObjectURL(blob);link.click();
        URL.revokeObjectURL(link.href);
        showToast('动态壁纸HTML已下载，用浏览器打开即可 💕');menu.style.display='none';
    });
}

function init(){
    resize();window.addEventListener('resize',resize);
    initDialogs();initContextMenu();render();
}

init();
</script>
